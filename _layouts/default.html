<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{%- include head.html -%}

<body>

  <!-- Header with Ticker Strip -->
  <header class="site-header" role="banner">
    <div class="header-top-bar">
      <div class="header-top-content">
        <span>{{ site.time | date: "%A, %B %d, %Y" }}</span>
        <span>Analysis for informed investors</span>
      </div>
    </div>
    
    <div class="header-main">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
        {{ site.title }}
      </a>
    </div>
    
    <!-- Live Ticker Strip - Shows on ALL pages -->
    <div class="ticker-strip">
      <div class="ticker-strip-content">
        <span class="ticker-strip-label">Today's Watchlist:</span>
        <span class="ticker-strip-item">
          <strong>SOFI</strong> $15.23 <span class="ticker-down">-4.0%</span>
        </span>
        <span class="ticker-strip-divider">|</span>
        <span class="ticker-strip-item">
          <strong>NVDA</strong> $108.50 <span class="ticker-down">-1.2%</span>
        </span>
        <span class="ticker-strip-divider">|</span>
        <span class="ticker-strip-item">
          <strong>XOM</strong> $116.20 <span class="ticker-up">+1.2%</span>
        </span>
        <span class="ticker-strip-divider">|</span>
        <span class="ticker-strip-item">
          <strong>PLTR</strong> $74.80 <span class="ticker-down">-2.2%</span>
        </span>
      </div>
    </div>
    
    <nav class="site-nav">
      <div class="nav-container">
        <div class="nav-links">
          <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
          <a href="{{ "/performance/" | relative_url }}" {% if page.url == "/performance/" %}class="active"{% endif %}>Performance</a>
          <a href="{{ "/archive/" | relative_url }}" {% if page.url == "/archive/" %}class="active"{% endif %}>Archive</a>
          <a href="{{ "/about/" | relative_url }}" {% if page.url == "/about/" %}class="active"{% endif %}>About</a>
        </div>
      </div>
    </nav>
  </header>

  <div class="page-content" aria-label="Content">
    {{ content }}
  </div>

  {%- include footer.html -%}

</body>

</html>
