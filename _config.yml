# Market Pulse Scanner - Configuration
title: Market Pulse Scanner
description: Daily stock market analysis with AI-assisted research and monitoring
url: "https://yourusername.github.io"
baseurl: ""

# AdSense Configuration
google_adsense: "pub-4794018087983976"

# Author
author:
  name: Market Pulse
  email: contact@marketpulse.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
