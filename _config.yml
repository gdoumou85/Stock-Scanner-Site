---
# Market Pulse Scanner - Configuration
title: Market Pulse Scanner
description: Daily stock market analysis with AI-assisted research and monitoring
url: "https://gdoumou85.github.io"
baseurl: "/Stock-Scanner-Site"

# AdSense Configuration
google_adsense: "pub-4794018087983976"

# Author
author:
  name: Market Pulse
  email: contact@marketpulse.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  watchlist:
    output: true
    permalink: /watchlist/:name/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .gitignore
  - DEPLOYMENT.md
  - PROJECT_PLAN.md

# Timezone
timezone: America/New_York
