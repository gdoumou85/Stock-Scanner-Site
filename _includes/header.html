<header class="site-header" role="banner">
  <div class="header-top">
    <div class="header-top-content">
      <span>{{ site.time | date: "%B %d, %Y" }} | Market Open: 9:30 AM EST</span>
      <span>Analysis for informed investors</span>
    </div>
  </div>
  
  <div class="header-main">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
      {{ site.title }}
    </a>
  </div>
  
  <nav class="site-nav">
    <div class="nav-container">
      <div class="nav-links">
        <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
        <a href="{{ "/performance/" | relative_url }}" {% if page.url == "/performance/" %}class="active"{% endif %}>Performance</a>
        <a href="{{ "/archive/" | relative_url }}" {% if page.url == "/archive/" %}class="active"{% endif %}>Archive</a>
        <a href="{{ "/about/" | relative_url }}" {% if page.url == "/about/" %}class="active"{% endif %}>About</a>
      </div>
    </div>
  </nav>
</header>
